<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Genius | Tech Museum</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/x-icon" href="/images/favicon.png">
</head>
<body class="flex flex-col justify-between overflow-x-hidden">
<canvas id="bg-network"></canvas>
<div id="page-wrapper" class="w-full relative overflow-x-hidden flex-grow">
<div id="page-content" class="w-full transition-all duration-700 ease-out">
<main class="w-full max-w-3xl mx-auto px-6 pt-8">
<div id="breadcrumb-container"></div>
<div class="mb-12">
<h2 class="text-3xl font-bold text-white mb-6 tracking-tight">Tech Museum</h2>
<div class="relative">
  <div class="glass-card-nohover rounded-xl px-4 py-3 flex items-center gap-3">
    <svg class="w-5 h-5 text-gray-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
    <input type="text" id="museum-search" placeholder="Search devices..." class="bg-transparent text-white w-full text-sm focus:outline-none placeholder-gray-500">
    <button id="filter-toggle" class="flex items-center gap-1.5 text-gray-400 hover:text-white transition-colors border-l border-white/10 pl-3 flex-shrink-0">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h10M4 18h6"></path></svg>
      <span class="text-sm">Filter</span>
    </button>
  </div>

  <div id="filter-panel" class="hidden absolute top-full right-0 mt-2 w-72 glass-card-nohover rounded-xl p-4 z-20">
    <div class="flex items-center justify-between mb-3">
      <span class="text-xs uppercase tracking-wide text-gray-500">Filter by letter</span>
      <button id="filter-clear" class="text-xs text-emerald-400 hover:text-emerald-300 transition-colors">Clear</button>
    </div>
    <div id="filter-letters" class="grid grid-cols-7 gap-2"></div>
  </div>
</div>
</div>
<div class="relative" id="museum-list">
</div>
</main>
</div>
</div>
<script src="js/global.js" defer></script>
<script src="js/museum.js" defer></script>
</body>
</html>
